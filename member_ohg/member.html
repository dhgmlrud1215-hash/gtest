<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/member.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="js/member.js"></script>

</head>
<body>
<div id="join_mem">
    <div class="logo">
        <h1>WIN<span>IX</span></h1>
    </div>
    <div class="banner">
        <img src="img/bn_1.png" alt="banner">
    </div>
<form name="member" action="result.php" method="post" onsubmit="return memberForm()" >
<fieldset>
<legend>회원가입</legend>
    <div class="box">
        <p>
        <label for="name">성명<span class="required">*</span></label>
        <input type="text" placeholder="성명입력" id="name" name="name">
        </p>
    
        <P>
        <label for="ph">휴대폰번호<span class="required">*</span></label>
        <input type="tel" maxlength="11" placeholder="‘-’을 제외하고 입력"
                name="tel" id="ph">
        </P>

        <div class="idgroup">
            <label for="id">아이디<span class="required">*</span></label>
            <div class="group">

            <input type="text" maxlength="12" placeholder="영문,숫자 조합 6~12자" name="id"  id="id">
            <a href="#"><img src="img/check.png" alt="check" id="checkId"></a>
            </div>
        </div>

        <p>
        <label for="pwd">비밀번호<span class="required">*</span></label>
        <input type="password" maxlength="16" name="pass" id="pwd"
            placeholder="영문,숫자 조합 8~16자" >
        </p>

        <p>
        <label for="pwd">비밀번호 확인<span class="required">*</span></label>
        <input type="password" maxlength="16" name="pass1" id="pwd1"
            placeholder="비밀번호 재입력" >
        </p>

        <p>
        <label for="email">이메일<span class="required">*</span></label>
        <input type="email" name="email" id="email" placeholder="이메일 입력">
        </p>
        
        <p>
        <label for="address">주소<span class="required">*</span></label>
        <input type="text" name="address" id="address" placeholder="주소 입력">
        </p>

        <div id="button">
            <input type="submit" value="가입하기" class="btn">
            <input type="reset" value="취소하기" class="reset">
        </div>
    </div>
</fieldset>
</form>
</div>
</body>
</html>
